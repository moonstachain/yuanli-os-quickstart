<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原力OS · 你的第二个大脑 — 给企业家的上手指南</title>
  <meta name="description" content="让你的判断力越用越值钱。一个不懂技术的企业家，也能拥有一个永不离职、越用越懂你的第二大脑。">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root{
      --bg:#0a0d12; --panel:#0f141c; --line:rgba(216,180,110,.16);
      --gold:#d8b46e; --gold-hi:#f2ddb0; --gold-dim:#8b6f2e;
      --ink:#e8e3d8; --mute:#8b93a0; --ok:#3fb583;
      --theme-color:#d8b46e;
    }
    body{background:var(--bg);color:var(--ink);
      font-family:-apple-system,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;}
    /* 侧栏 */
    .sidebar{background:var(--panel);border-right:1px solid var(--line);}
    .sidebar-nav{line-height:1.9;}
    .sidebar ul li a{color:var(--mute);font-size:14px;}
    .sidebar ul li a:hover{color:var(--gold-hi);}
    .sidebar ul li.active>a{color:var(--gold);font-weight:600;border-right:2px solid var(--gold);}
    .sidebar>h1 a{color:var(--gold-hi);}
    .app-name-link{color:var(--gold-hi)!important;}
    /* 正文 */
    .markdown-section{color:var(--ink);max-width:820px;}
    .markdown-section h1,.markdown-section h2{color:var(--gold-hi);font-weight:700;
      border-bottom:1px solid var(--line);padding-bottom:.3em;}
    .markdown-section h3{color:var(--gold);}
    .markdown-section h2{font-size:1.5rem;}
    .markdown-section a{color:var(--gold);border-bottom:1px dashed var(--gold-dim);}
    .markdown-section strong{color:var(--gold-hi);}
    .markdown-section blockquote{border-left:4px solid var(--gold);background:rgba(216,180,110,.06);
      color:var(--ink);border-radius:0 8px 8px 0;}
    .markdown-section tr{border-top:1px solid var(--line);background:transparent;}
    .markdown-section th,.markdown-section td{border:1px solid var(--line);}
    .markdown-section th{color:var(--gold);background:rgba(216,180,110,.06);}
    .markdown-section code{color:var(--gold-hi);background:rgba(216,180,110,.1);}
    .markdown-section pre{background:#11161f;}
    .markdown-section pre>code{color:#cfc7b6;background:transparent;}
    .markdown-section p>img,.markdown-section p>em{color:var(--mute);}
    /* 封面 */
    section.cover{background:radial-gradient(1200px 600px at 70% -10%,rgba(216,180,110,.10),transparent 60%),var(--bg)!important;}
    section.cover .cover-main>p:last-child a{background:linear-gradient(90deg,#8b6f2e,#c9a961);
      border:0;color:#0a0e14;font-weight:700;border-radius:8px;}
    section.cover .cover-main>p:last-child a:last-child{background:transparent;color:var(--gold);border:1px solid var(--gold-dim);}
    section.cover h1{color:var(--gold-hi);}
    section.cover blockquote p{color:var(--mute);}
    /* 搜索框 */
    .search input{background:#11161f;border:1px solid var(--line);color:var(--ink);}
    .search .results-panel{background:var(--panel);}
    .search h2{color:var(--gold);}
    .search .matching-post{border-bottom:1px solid var(--line);}
    .search p{color:var(--mute);}
  </style>
</head>
<body>
  <div id="app">加载中……第一次打开稍等两三秒</div>
  <script>
    window.$docsify = {
      name: '原力OS · 第二个大脑',
      repo: 'https://github.com/moonstachain/yuanli-os-quickstart',
      loadSidebar: true,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 2,
      search: {
        placeholder: '搜索……',
        noData: '找不到，换个词试试',
        depth: 3,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
